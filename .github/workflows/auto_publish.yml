name: Auto Publish Daily Article

on:
  schedule:
    # Runs at 01:00 UTC every day (09:00 AM Beijing time)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub website

permissions:
  contents: write

jobs:
  publish_article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Publish Script
        run: python scripts/publish_draft.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-publish daily SEO article" && git push)
